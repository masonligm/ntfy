worker_processes auto;
events { worker_connections 2048; }

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # WebSocket 连接升级映射 (必须在 http 块开头)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 长连接超时设置
    keepalive_timeout 75s;
    keepalive_requests 100;

    # 全局 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    upstream minio_api {
        server 192.168.1.128:9000;  # MinIO API 服务
    }

    upstream minio {
        server 192.168.1.128:9001;  # MinIO web 服务
    }

    upstream xsrctech_website {
        server 192.168.1.128:8080;  # xsrctech website 服务
    }
    
    upstream xsrctech_axure {
        server 192.168.1.128:8081;  # xsrctech website 服务
    }
  
    upstream xsrctech_bms {
        server 192.168.1.128:8300;  # xsrctech bms 服务
    }
    
    upstream ntfy_xsrctech {
        server 192.168.1.128:8180;  # ntfy 通知
    } 

    server {
        listen 80;
        server_name obsibian.kenyonli.com;

        location / {
            proxy_pass http://minio_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /console {
            proxy_pass http://minio;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    server {
        listen 80;
        server_name obsibian.api.kenyonli.com;

        location / {
            proxy_pass http://minio_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
   
    server {
        listen 80;
        server_name www.xsrctech.com;

        location / {
            proxy_pass http://xsrctech_website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       443 ssl;
        server_name  www.xsrctech.com;

        ssl_certificate     /root/nginx.d/ssl.d/xsrctech.com_Nginx/www.xsrctech.com_server.crt;
        ssl_certificate_key /root/nginx.d/ssl.d/xsrctech.com_Nginx/www.xsrctech.com_server.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;
        
        location / {
            proxy_pass http://xsrctech_website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       443 ssl;
        server_name  bms.xsrctech.com;

        ssl_certificate     /root/nginx.d/ssl.d/bms.xsrctech.com_Nginx/bms.xsrctech.com_server.crt;
        ssl_certificate_key /root/nginx.d/ssl.d/bms.xsrctech.com_Nginx/bms.xsrctech.com_server.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            proxy_pass http://xsrctech_bms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
    listen 8081;
    server_name xsrctech_axure;   # 或者直接写服务器IP

    root /var/www/axure;
    index start.html index.html;

    location / {
        try_files $uri $uri/ /start.html;
    }

    # 静态资源缓存，提高加载速度
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|html)$ {
        expires 7d;
        access_log off;
    }

    # 字体跨域支持（可选）
    location ~* \.(eot|ttf|woff|woff2)$ {
        add_header Access-Control-Allow-Origin *;
    }

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain application/javascript text/css application/json text/html;
  }
   
   
    server {
        listen 80;
        server_name  ntfy.xsrctech.com;

        location / {
            proxy_pass http://ntfy_xsrctech;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE 长连接支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 长连接超时设置 (ntfy 默认保持连接打开)
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # 禁用缓冲，实时推送
            proxy_buffering off;
            proxy_cache off;
        }
    }

    server {
        listen       443 ssl;
        http2 on;
        server_name  ntfy.xsrctech.com;

        ssl_certificate     /root/nginx.d/ssl.d/xsrctech.com_Nginx/ntfy.xsrctech.com_server.crt;
        ssl_certificate_key /root/nginx.d/ssl.d/xsrctech.com_Nginx/ntfy.xsrctech.com_server.key;

        # 现代 SSL 配置
        ssl_session_cache    shared:NTFY_SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://ntfy_xsrctech;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE 长连接支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 长连接超时设置 (ntfy 默认保持连接打开)
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # 禁用缓冲，实时推送
            proxy_buffering off;
            proxy_cache off;
        }
    }

}
